name: 'AutoCoder'
description: 'Generate code from GitHub issues using ChatGPT and create a pull request.'
author: 'Rene Baumann'

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token used for GitHub API authentication.'
    required: true
  REPOSITORY:
    description: 'Repository where the action is executed.'
    required: true
  ISSUE_NUMBER:
    description: 'Issue number that triggered the action.'
    required: true
  OPENAI_API_KEY:
    description: 'OpenAI API key used to interact with ChatGPT.'
    required: true
  SCRIPT_PATH:
    description: 'Path to the script that interacts with ChatGPT.'
    required: true
    default: 'scripts/script.sh'
  LABEL:
    description: 'Issue label that triggers AutoCoder.'
    required: true
    default: 'autocoder-bot'

outputs:
  pull_request_url:
    description: 'URL of the created pull request.'

runs:
  using: 'composite'
  steps:
    - name: Make script executable
      run: chmod +x ${{ inputs.SCRIPT_PATH }}
      shell: bash

    - name: Interact with ChatGPT
      run: |
        ${{ inputs.SCRIPT_PATH }} "${{ inputs.GITHUB_TOKEN }}" "${{ inputs.REPOSITORY }}" "${{ inputs.ISSUE_NUMBER }}" "${{ inputs.OPENAI_API_KEY }}"
      shell: bash

branding:
  icon: 'code'
  color: 'blue'
