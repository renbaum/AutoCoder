name: 'AutoCoder'
description: 'Generate code from GitHub issues using ChatGPT and create a pull request.'
author: 'Rene Baumann'

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token used for GitHub API authentication.'
    required: true
  REPOSITORY:
    description: 'Repository where the action is executed.'
    required: true
  ISSUE_NUMBER:
    description: 'Issue number that triggered the action.'
    required: true
  OPENAI_API_KEY:
    description: 'OpenAI API key.'
    required: true
  SCRIPT_PATH:
    description: 'Path to the script.'
    required: true
    default: 'scripts/script.sh'
  LABEL:
    description: 'Issue label that triggers AutoCoder.'
    required: true
    default: 'autocoder-bot'

outputs:
  pull_request_url:
    description: 'URL of the created pull request.'
    value: ${{ steps.cpr.outputs.pull-request-url }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make script executable
      shell: bash
      run: chmod +x "${{ inputs.SCRIPT_PATH }}"

    - name: Interact with ChatGPT
      shell: bash
      run: |
        chmod +x scripts/script.sh
        ./scripts/script.sh "${{ inputs.GITHUB_TOKEN }}" "${{ github.repository }}" "${{ github.event.issue.number }}" "${{ secrets.OPENAI_API_KEY }}" || true
        mkdir -p autocoder-bot
        echo "Generated by AutoCoder" > autocoder-bot/result.txt

    - name: Commit files
      shell: bash
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "autocoder-bot"
        git add .
        git commit -m "Generate code for issue #${{ github.event.issue.number }}" || true
    
    - name: Create pull request
      id: cpr
      uses: peter-evans/create-pull-request@v7
      with:
        branch: autocoder-branch-${{ inputs.ISSUE_NUMBER }}
        base: main
        labels: ${{ inputs.LABEL }}
        title: "AutoCoder generated code for issue #${{ inputs.ISSUE_NUMBER }}"
        commit-message: "Generate code for issue #${{ inputs.ISSUE_NUMBER }}"
        author: "autocoder-bot <actions@github.com>"
        committer: "autocoder-bot <actions@github.com>"

branding:
  icon: 'code'
  color: 'blue'
