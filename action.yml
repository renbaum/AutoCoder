name: 'AutoCoder'
description: 'Generate code from GitHub issues using ChatGPT and create a pull request.'
author: 'Rene Baumann'

inputs:
  GITHUB_TOKEN:
    description: 'Personal access token (PAT) used for GitHub API authentication.'
    required: true

  REPOSITORY:
    description: 'The repository where the action is executed.'
    required: true

  ISSUE_NUMBER:
    description: 'The issue number that triggered the action.'
    required: true

  OPENAI_API_KEY:
    description: 'API key used to access the OpenAI API.'
    required: true

  SCRIPT_PATH:
    description: 'Path to the script that interacts with ChatGPT.'
    required: true
    default: 'scripts/script.sh'

  LABEL:
    description: 'The label that triggers the action.'
    required: true
    default: 'autocoder-bot'

outputs:
  pull_request_url:
    description: 'URL of the created pull request.'

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make script executable
      shell: bash
      run: chmod +x "${{ inputs.SCRIPT_PATH }}"

    - name: Interact with ChatGPT
      shell: bash
      run: |
        "${{ inputs.SCRIPT_PATH }}" \
          "${{ inputs.GITHUB_TOKEN }}" \
          "${{ inputs.REPOSITORY }}" \
          "${{ inputs.ISSUE_NUMBER }}" \
          "${{ inputs.OPENAI_API_KEY }}"

    - name: Create pull request
      id: create-pr
      uses: peter-evans/create-pull-request@v7
      with:
        branch: autocoder-branch-${{ inputs.ISSUE_NUMBER }}
        base: main
        labels: ${{ inputs.LABEL }}
        title: "AutoCoder generated code for issue #${{ inputs.ISSUE_NUMBER }}"
        commit-message: "Generate code for issue #${{ inputs.ISSUE_NUMBER }}"
        author: "autocoder-bot <actions@github.com>"
        committer: "autocoder-bot <actions@github.com>"

branding:
  icon: code
  color: blue
