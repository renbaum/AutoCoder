name: AutoCoder

on:
  issues:
    types: [opened, reopened, labeled]

jobs:
  autocoder:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Code with ChatGPT
        run: |
          chmod +x scripts/script.sh
          mkdir -p autocoder-bot
          ./scripts/script.sh "${{ secrets.GITHUB_TOKEN }}" "${{ github.repository }}" "${{ github.event.issue.number }}" "${{ secrets.OPENAI_API_KEY }}" || true
          echo "Generated by AutoCoder" > autocoder-bot/result.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-bot

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-artifact

      - name: Display Generated Code
        run: ls -R autocoder-artifact
