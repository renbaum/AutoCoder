name: AutoCoder

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  interact-with-chatgpt:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/script.sh

      - name: Run interaction script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ./scripts/script.sh "$GITHUB_TOKEN" "$REPOSITORY" "$ISSUE_NUMBER" "$OPENAI_API_KEY"

      - name: Commit files
        run: |
          git config user.name "autocoder-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Generate code for issue #${{ github.event.issue.number }}" || echo "No changes to commit"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: autocoder-branch-${{ github.event.issue.number }}
          base: main
          labels: autocoder-bot
