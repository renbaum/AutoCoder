name: AutoCoder

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  autocoder:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "autocoder-bot"
          git config user.email "actions@github.com"

      - name: Make script executable
        run: chmod +x scripts/script.sh

      - name: Run script
        run: |
          ./scripts/script.sh "${{ secrets.GITHUB_TOKEN }}" "${{ github.repository }}" "${{ github.event.issue.number }}" "${{ secrets.OPENAI_API_KEY }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: autocoder-branch-${{ github.event.issue.number }}
          base: main
          labels: autocoder-bot
