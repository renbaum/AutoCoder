name: AutoCoder

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  interact-with-chatgpt:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/script.sh

      - name: Run interaction script
        run: |
          ./scripts/script.sh "${{ secrets.GITHUB_TOKEN }}" "${{ github.repository }}" "${{ github.event.issue.number }}" "${{ secrets.OPENAI_API_KEY }}" || true
          mkdir -p autocoder-bot
          echo "Generated fallback file" > autocoder-bot/result.txt

      - name: Commit files
        run: |
          git config user.name "autocoder-bot"
          git config user.email "actions@github.com"
          git add autocoder-bot
          git commit -m "Generate code for issue #${{ github.event.issue.number }}" || echo "No changes to commit"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: autocoder-branch-${{ github.event.issue.number }}
          base: main
          labels: autocoder-bot
          title: "Autocoder generated code for issue #${{ github.event.issue.number }}"
          committer: autocoder-bot <actions@github.com>
          author: autocoder-bot <actions@github.com>
