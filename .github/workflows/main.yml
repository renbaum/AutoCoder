name: AutoCoder

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  interact-with-chatgpt:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Interact with ChatGPT
        run: |
          chmod +x scripts/script.sh
          ./scripts/script.sh "${{ secrets.GITHUB_TOKEN }}" "${{ github.repository }}" "${{ github.event.issue.number }}" "${{ secrets.OPENAI_API_KEY }}" || true
          mkdir -p autocoder-bot
          echo "Generated by AutoCoder" > autocoder-bot/result.txt
